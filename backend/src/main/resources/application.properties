spring.application.name=weavers_management

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/weaveflow_db}
#spring.datasource.username=${DB_USERNAME}
#spring.datasource.password=${DB_PASSWORD}

spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:pass123}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#jwt.secret=${JWT_SECRET}
jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTToken12345678901234567890}
jwt.expiration=86400000

server.port=${PORT:8080}